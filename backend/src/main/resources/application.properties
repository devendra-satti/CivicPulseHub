# 1. Database Connection
# spring.datasource.url=jdbc:mysql://localhost:3306/civicpulse_db
# spring.datasource.username=root
# spring.datasource.password=root

# H2 Embedded Database Configuration (MySQL Mode)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. JPA / Hibernate Settings (This creates tables for you automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. JWT Secret Key (Security stuff for later)
# JWT Configuration - Uses an environment variable or a secure fallback string
app.jwt.secret=${JWT_SECRET:mySecretKeyForSigningTokensItsBestToMakeThisLongAndComplex1234567890}
app.jwt.expiration=86400000

# Mock Mail Configurations to pass Spring Boot Startup Checks

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


